<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Support — Gameshop</title>
<link rel="icon" href="https://raw.githubusercontent.com/lpatitouandelaunay-cmyk/GameShop/main/image%20apt.ico" />
<style>
  :root {
    --bg: #0f1724;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --text: #e6eef8;
    --muted: #94a3b8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(180deg, #071027, #0f1724);
    color: var(--text);
    font-family: "Inter", sans-serif;
    overflow: hidden;
  }

  .logo {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    opacity: 0;
    animation: fadeIn 1s ease forwards 0.3s;
  }
  .logo img { width: 70px; border-radius: 12px; }
  .logo span { display:block; color:var(--muted); font-weight:600; margin-top:5px; }

  @keyframes fadeIn { to {opacity:1;} }

  /* Animation lettre */
  .letter {
    position: relative;
    width: 160px;
    height: 100px;
    background: var(--accent);
    border-radius: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    overflow: hidden;
    animation: moveUp 2.5s ease forwards 2.2s;
  }

  .flap {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin: top;
    animation: openFlap 2s ease forwards 0.3s;
  }

  @keyframes openFlap {
    0% { transform: rotateX(0deg); }
    100% { transform: rotateX(180deg); }
  }

  @keyframes moveUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-250px) scale(0.8); opacity: 0; }
  }

  .support {
    position: absolute;
    top: 130%;
    width: 90%;
    max-width: 850px;
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    padding: 24px;
    opacity: 0;
    transform: translateY(40px);
    animation: showInterface 1s ease forwards 3s;
  }

  @keyframes showInterface {
    to { opacity: 1; transform: translateY(-50%); top: 50%; }
  }

  h2 { margin-top: 0; font-size: 22px; }
  p { color: var(--muted); margin-bottom: 15px; }

  .btn-group {
    display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px;
  }
  .preset-btn {
    flex: 1; min-width: 120px;
    border: none; border-radius: 8px;
    padding: 10px; color: #fff;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    font-weight: 600; cursor: pointer;
    transition: 0.2s;
  }
  .preset-btn:hover { opacity: 0.9; transform: translateY(-2px); }

  .form-group { margin-bottom: 12px; }
  label { font-size: 14px; color: var(--muted); margin-bottom: 4px; display: block; }

  input, textarea, select {
    width: 100%; padding: 10px;
    border: none; border-radius: 8px;
    background: rgba(255,255,255,0.08);
    color: #fff;
  }

  .btn-send {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border: none; border-radius: 8px;
    padding: 10px 18px; color: white; font-weight: 600; cursor: pointer;
    transition: 0.2s;
  }
  .btn-send:hover { opacity: 0.9; transform: translateY(-2px); }

</style>
</head>
<body>

<div class="logo">
  <img src="https://raw.githubusercontent.com/lpatitouandelaunay-cmyk/GameShop/main/image%20apt.ico" alt="Logo Gameshop">
  <span>Gameshop Support</span>
</div>

<div class="letter"><div class="flap"></div></div>

<div class="support">
  <h2>Centre de Support Gameshop</h2>
  <p>Choisissez un type de demande, puis remplissez le message.</p>

  <div class="btn-group">
    <button class="preset-btn" onclick="preset('bug')">🐞 Bug</button>
    <button class="preset-btn" onclick="preset('jeu')">🎮 Jeu</button>
    <button class="preset-btn" onclick="preset('suggestion')">💡 Suggestion</button>
  </div>

  <div class="form-group">
    <label for="type">Type de message :</label>
    <select id="type">
      <option value="bug">Bug technique</option>
      <option value="erreur">Erreur de chargement</option>
      <option value="demande">Demande de nouveau jeu</option>
      <option value="avis">Donner un avis</option>
      <option value="autre">Autre</option>
    </select>
  </div>

  <div class="form-group">
    <label for="subject">Sujet</label>
    <input type="text" id="subject" placeholder="Ex: Bug sur le jeu Pacman" />
  </div>

  <div class="form-group">
    <label for="message">Message</label>
    <textarea id="message" rows="5" placeholder="Décrivez le problème ou votre demande..."></textarea>
  </div>

  <button class="btn-send" id="gmailBtn">📧 Envoyer via Gmail</button>
</div>

<script>
function preset(type) {
  const s = document.getElementById('subject');
  const m = document.getElementById('message');
  if (type === 'bug') {
    s.value = 'Signalement de bug - Gameshop';
    m.value = 'Bonjour,\\n\\nJe signale un bug rencontré sur le site ou un jeu :\\n\\n- Jeu concerné :\\n- Description du bug :\\n- Étapes pour le reproduire :\\n\\nMerci !';
  } else if (type === 'jeu') {
    s.value = 'Demande d’ajout de jeu - Gameshop';
    m.value = 'Bonjour,\\n\\nJe souhaite proposer l’ajout d’un jeu :\\n\\n- Nom du jeu :\\n- Lien / référence :\\n- Pourquoi il serait intéressant :';
  } else {
    s.value = 'Suggestion / Amélioration - Gameshop';
    m.value = 'Bonjour,\\n\\nVoici une suggestion ou idée pour améliorer Gameshop :\\n\\n- Idée :\\n- Pourquoi elle serait utile :';
  }
}

document.getElementById('gmailBtn').addEventListener('click', () => {
  const sub = document.getElementById('subject').value.trim();
  const body = document.getElementById('message').value.trim();
  const to = 'lpa.titouan.delaunay@gmail.com';
  const url = `https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(to)}&su=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`;
  window.open(url, '_blank');
});
</script>
</body>
</html>
